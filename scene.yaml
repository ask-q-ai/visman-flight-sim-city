---
initial_vm_state:
  yaw: 0.0
  pitch: 0.0
  speed: 18.0
  camera_mode: chase
  time_mode: night
stateConstraints:
- path: vm.yaw
  mode: wrap
  min: -3.141592653589793
  max: 3.141592653589793
- path: vm.pitch
  mode: clamp
  min: -0.6
  max: 0.6
- path: vm.speed
  mode: clamp
  min: 0.0
  max: 85.0
camera:
  followTarget: plane
  followOffset:
    x: 0
    y: 2.4
    z: 8.5
  followSmoothing: 0.14
  fov: 72
  lookAhead: 12
  cameraDamping: 9
  speedFovBoost: 0.026
  turnBank: 0.0
  microShake: 0.01
  activeProfilePath: "@vm.camera_mode"
  profiles:
    chase:
      followTarget: plane
      followOffset:
        x: 0
        y: 2.4
        z: 8.5
      followSmoothing: 0.14
      fov: 72
      lookAhead: 12
      cameraDamping: 9
      speedFovBoost: 0.026
      turnBank: 0.0
      microShake: 0.01
    pov:
      followTarget: plane
      followOffset:
        x: 0
        y: 0.56
        z: 0.22
      followSmoothing: 0.2
      fov: 88
      lookAhead: 26
      cameraDamping: 14
      speedFovBoost: 0.018
      turnBank: 0.0
      microShake: 0.006
  enableControls: false
background:
  color: '{{ @vm.time_mode == "night" ? "#060C1B" : "#A9CBE6" }}'
atmosphere:
  preset: '{{ @vm.time_mode == "night" ? "night" : "day" }}'
  fogColor: '{{ @vm.time_mode == "night" ? "#111B33" : "#D2E1EA" }}'
  fogNear: '{{ @vm.time_mode == "night" ? 60 : 120 }}'
  fogFar: '{{ @vm.time_mode == "night" ? 470 : 780 }}'
  density: '{{ @vm.time_mode == "night" ? 0.0028 : 0.00025 }}'
  exposure: '{{ @vm.time_mode == "night" ? 0.78 : 1.04 }}'
shadows:
  enabled: true
  type: pcfsoft
  mapSize: 2048
  bias: -0.00024
  normalBias: 0.014
  radius: 1.4
  autoUpdate: true
postProcessing:
  enabled: true
  bloomEnabled: true
  bloomStrength: '{{ @vm.time_mode == "night" ? 0.78 : 0.16 }}'
  bloomRadius: '{{ @vm.time_mode == "night" ? 0.22 : 0.05 }}'
  bloomThreshold: '{{ @vm.time_mode == "night" ? 0.68 : 0.9 }}'
  filmEnabled: '{{ @vm.time_mode == "night" ? false : false }}'
