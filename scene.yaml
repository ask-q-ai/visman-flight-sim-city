- id: plane
  context: threejs
  type: box
  position:
    x: 0
    y: 15
    z: 0
  rotation:
    x: "{{ @vm.pitch }}"
    y: "{{ @vm.yaw }}"
    z: 0.0
  size:
    width: 1.2
    height: 0.34
    depth: 1.8
  material:
    color: "#EAF4FF"
    usePbr: true
    roughness: '{{ @vm.time_mode == "night" ? 0.2 : 0.28 }}'
    metalness: '{{ @vm.time_mode == "night" ? 0.72 : 0.56 }}'
    clearcoat: 0.85
    clearcoatRoughness: 0.12
    envMapUrl: '{{ @vm.time_mode == "night" ? "stars" : "" }}'
  physics:
    kinematic: true
    bodyType: kinematic
    forwardSpeedPath: speed
    minForwardSpeed: 0
    maxForwardSpeed: 85
  actions:
    steer_left:
      stateMutations:
      - path: vm.yaw
        operation: add_wrapped
        value: 0.04
        min: -3.141592653589793
        max: 3.141592653589793
    steer_right:
      stateMutations:
      - path: vm.yaw
        operation: add_wrapped
        value: -0.04
        min: -3.141592653589793
        max: 3.141592653589793
    steer_up:
      stateMutations:
      - path: vm.pitch
        operation: add_clamped
        value: 0.02
        min: -0.6
        max: 0.6
    steer_down:
      stateMutations:
      - path: vm.pitch
        operation: add_clamped
        value: -0.02
        min: -0.6
        max: 0.6
    toggle_camera:
      stateMutations:
      - path: vm.camera_mode
        operation: cycle_enum
        choices:
        - chase
        - pov
    toggle_time_mode:
      stateMutations:
      - path: vm.time_mode
        operation: cycle_enum
        choices:
        - night
        - day
    throttle_up:
      stateMutations:
      - path: vm.speed
        operation: add_clamped
        value: 5.0
        min: 0.0
        max: 85.0
    throttle_down:
      stateMutations:
      - path: vm.speed
        operation: add_clamped
        value: -5.0
        min: 0.0
        max: 85.0
  callbacks:
    onKeyHeld:
      ArrowLeft: steer_left
      ArrowRight: steer_right
      ArrowUp: steer_up
      ArrowDown: steer_down
    onKeyDown:
      w: throttle_up
      s: throttle_down
      c: toggle_camera
      n: toggle_time_mode
      W: throttle_up
      S: throttle_down
      C: toggle_camera
      N: toggle_time_mode
domLayer:
- id: hud
  context: dom
  type: div
  position:
    x: 20
    y: 15
  properties:
    text: CITY FLIGHT (PBR)  MODE {{ @vm.time_mode }}  SPD {{ @vm.speed }}  YAW {{
      @vm.yaw }}
  style:
    color: "#72E1FF"
    fontSize: 16
    fontFamily: monospace
    fontWeight: bold
- id: controls
  context: dom
  type: div
  position:
    x: 20
    y: 330
  properties:
    text: ARROWS steer | W/S throttle | C camera (chase/POV) | N day/night | Fly the
      skyline corridor
  style:
    color: rgba(255,255,255,0.7)
    fontSize: 13
    fontFamily: monospace
